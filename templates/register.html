{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card shadow-sm">
            <div class="card-header bg-primary text-white">
                <h4 class="mb-0">User Registration</h4>
            </div>
            <div class="card-body">
                <form method="POST" action="{{ url_for('register') }}">
                    <div class="row mb-3">
                        <div class="col-md-6">
                            <label for="name" class="form-label">Full Name</label>
                            <input type="text" class="form-control" id="name" name="name" required>
                        </div>
                        <div class="col-md-6">
                            <label for="email" class="form-label">Email Address</label>
                            <input type="email" class="form-control" id="email" name="email" required>
                        </div>
                    </div>
                    <div class="row mb-3">
                        <div class="col-md-6">
                            <label for="password" class="form-label">Password</label>
                            <input type="password" class="form-control" id="password" name="password" 
                                   required minlength="8">
                            <div class="form-text">Password must be at least 8 characters long.</div>
                        </div>
                        <div class="col-md-6">
                            <label for="confirm_password" class="form-label">Confirm Password</label>
                            <input type="password" class="form-control" id="confirm_password" name="confirm_password" 
                                   required minlength="8">
                        </div>
                    </div>
                    <div class="mb-3">
                        <label for="location" class="form-label">City/Location</label>
                        <select class="form-select mb-2" id="locationSelect" onchange="handleLocationChange()">
                            <option value="" selected>Choose from list or enter custom below</option>
                            {% for city in cities %}
                            <option value="{{ city.name }}">{{ city.name }}</option>
                            {% endfor %}
                            <option value="custom">My location is not listed</option>
                        </select>
                        <input type="text" class="form-control" id="location" name="location" required>
                        <div class="form-text">This helps us connect you with healthcare providers in your area.</div>
                    </div>
                    <script>
                    function handleLocationChange() {
                        var select = document.getElementById('locationSelect');
                        var customInput = document.getElementById('location');
                        if (select.value === 'custom') {
                            customInput.value = '';
                            customInput.placeholder = 'Enter your location';
                            customInput.focus();
                        } else if (select.value !== '') {
                            customInput.value = select.value;
                        }
                    }
                    </script>
                    <div class="d-grid">
                        <button type="submit" class="btn btn-primary">Register</button>
                    </div>
                </form>
            </div>
            <div class="card-footer text-center">
                <p class="mb-0">Already have an account? <a href="{{ url_for('login') }}">Login now</a></p>
                <p class="mt-2 mb-0">Are you a doctor? <a href="{{ url_for('doctor_register') }}">Register as a doctor</a></p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
