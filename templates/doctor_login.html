{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card shadow-sm">
            <div class="card-header bg-info text-white">
                <h4 class="mb-0">Doctor Login</h4>
            </div>
            <div class="card-body">
                <form method="POST" action="{{ url_for('doctor_login') }}">
                    <div class="mb-3">
                        <label for="email" class="form-label">Email Address</label>
                        <input type="email" class="form-control" id="email" name="email" required>
                    </div>
                    <div class="mb-3">
                        <label for="password" class="form-label">Password</label>
                        <input type="password" class="form-control" id="password" name="password" required>
                    </div>
                    <div class="d-grid">
                        <button type="submit" class="btn btn-info">Login</button>
                    </div>
                </form>
            </div>
            <div class="card-footer text-center">
                <p class="mb-0">Don't have an account? <a href="{{ url_for('doctor_register') }}">Register now</a></p>
                <p class="mt-2 mb-0">Are you a patient? <a href="{{ url_for('login') }}">Login as a patient</a></p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
